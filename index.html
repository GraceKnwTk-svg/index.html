<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h2 class="title">📊 Daily Report Generator</h2>
            <p class="subtitle">By MAX HBYAI-C</p>
            <form id="reportForm">
                <div class="form-group"><label>Hub</label><input type="text" id="hub" value="ABYAI-B"></div>
                <div class="form-group"><label>Date</label><input type="date" id="date" value="2026-07-08"></div>
                <div class="form-group"><label>Time</label><input type="time" id="time" value="14:42"></div>
                <div class="form-group"><label>In Hub</label><input type="number" id="inHub" placeholder="กรอกจำนวน Pcs."></div>
                <div class="form-group"><label>Assign</label><input type="number" id="assign" placeholder="กรอกจำนวน Pcs."></div>
                <div class="form-group"><label>Delivered To Buyer</label><input type="number" id="delivered" placeholder="กรอกจำนวน Pcs."></div>
                <div class="form-group"><label>2W Actual</label><input type="number" id="actual2w" placeholder="กรอกจำนวน คน"></div>
                <div class="form-group"><label>4W Actual</label><input type="number" id="actual4w" placeholder="กรอกจำนวน คน"></div>
                <div class="form-group"><label>Issue</label><textarea id="issue" rows="3"></textarea></div>
                <div class="form-group"><label>Action</label><textarea id="action" rows="3"></textarea></div>
                <button type="button" class="btn btn-orange" onclick="generateReport()">Generate Report</button>
                <button type="button" class="btn btn-green" onclick="copyReport()">📋 Copy Report</button>
                <button type="button" class="btn btn-red" onclick="clearReport()">🗑️ Clear Data</button>
            </form>
        </div>
        <div class="result-section">
            <h3>Result</h3>
            <textarea id="resultBox" readonly placeholder="ผลลัพธ์รายงานจะแสดงที่นี่..."></textarea>
        </div>
    </div>
    <div class="footer"><p>Version 1.0</p><p>By Grace ABYAI-B</p></div>
    <script src="script.js"></script>
</body>
</html>
